<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Thermal Triangle PRO</title>
<style>
body{
  margin:0;
  background:#0c0c0c;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
</style>
</head>
<body>
<canvas id="c" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

const center = { x: W/2, y: H/2 + 40 };
const outerRadius = 230;
const whiteOffset = 18;
const circleGap = 12;

let targetValues = [30,70,40];
let values = [30,70,40];

// ======================
// Utils
// ======================

function lerp(a,b,t){ return a+(b-a)*t; }

function normalize(v){
  const l = Math.hypot(v.x,v.y);
  return { x:v.x/l, y:v.y/l };
}

function trianglePoints(radius){
  const pts=[];
  for(let i=0;i<3;i++){
    const a = -Math.PI/2 + i*(2*Math.PI/3);
    pts.push({
      x:center.x + Math.cos(a)*radius,
      y:center.y + Math.sin(a)*radius
    });
  }
  return pts;
}

// ======================
// Rounded triangle (true arcs)
// ======================

function drawRoundedTriangle(points, radii, doFill=true){

  ctx.beginPath();

  for(let i=0;i<3;i++){

    const prev = points[(i+2)%3];
    const curr = points[i];
    const next = points[(i+1)%3];

    const v1 = normalize({x:prev.x-curr.x,y:prev.y-curr.y});
    const v2 = normalize({x:next.x-curr.x,y:next.y-curr.y});

    const angle = Math.acos(
      (v1.x*v2.x + v1.y*v2.y)
    );

    const r = radii[i];
    const t = r / Math.tan(angle/2);

    const p1 = {
      x: curr.x + v1.x * t,
      y: curr.y + v1.y * t
    };

    const p2 = {
      x: curr.x + v2.x * t,
      y: curr.y + v2.y * t
    };

    if(i===0) ctx.moveTo(p1.x,p1.y);
    else ctx.lineTo(p1.x,p1.y);

    const bisector = normalize({
      x: v1.x + v2.x,
      y: v1.y + v2.y
    });

    const centerArc = {
      x: curr.x + bisector.x * (r / Math.sin(angle/2)),
      y: curr.y + bisector.y * (r / Math.sin(angle/2))
    };

    const startAngle = Math.atan2(p1.y-centerArc.y,p1.x-centerArc.x);
    const endAngle   = Math.atan2(p2.y-centerArc.y,p2.x-centerArc.x);

    ctx.arc(centerArc.x, centerArc.y, r, startAngle, endAngle);
  }

  ctx.closePath();

  if(doFill){
    ctx.fillStyle="#f2f2f2";
    ctx.fill();
  }
}

// ======================
// Draw
// ======================

function draw(){

  ctx.clearRect(0,0,W,H);

  // interpolation fluide
  for(let i=0;i<3;i++){
    values[i] += (targetValues[i] - values[i]) * 0.08;
  }

  const outer = trianglePoints(outerRadius);
  const inner = trianglePoints(outerRadius - whiteOffset);

  // triangle extérieur
  ctx.beginPath();
  ctx.moveTo(outer[0].x,outer[0].y);
  ctx.lineTo(outer[1].x,outer[1].y);
  ctx.lineTo(outer[2].x,outer[2].y);
  ctx.closePath();
  ctx.strokeStyle="#fff";
  ctx.lineWidth=3;
  ctx.stroke();

  const radii=[];
  const circles=[];

  for(let i=0;i<3;i++){

    const val = values[i]/100;

    const minR=18;
    const maxR=75;
    const circleR=lerp(minR,maxR,val);

    radii.push(circleR + circleGap);

    const vertex = inner[i];
    const dir = normalize({
      x:center.x-vertex.x,
      y:center.y-vertex.y
    });

    const minDist=circleR+circleGap;
    const maxDist=120;
    const dist=lerp(maxDist,minDist,val);

    const cx = vertex.x + dir.x*dist;
    const cy = vertex.y + dir.y*dist;

    circles.push({x:cx,y:cy,r:circleR});
  }

  // triangle blanc arrondi
  drawRoundedTriangle(inner,radii,true);

  // CLIP
  ctx.save();
  drawRoundedTriangle(inner,radii,false);
  ctx.clip();

  // cercles noirs
  circles.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.fillStyle="#111";
    ctx.fill();
  });

  ctx.restore();

  requestAnimationFrame(draw);
}

draw();

// Demo dynamique
setInterval(()=>{
  targetValues = targetValues.map(v=>{
    v += Math.random()*40 -20;
    return Math.max(0,Math.min(100,v));
  });
},2500);

</script>
</body>
</html>
