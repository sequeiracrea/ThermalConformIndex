<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Thermal Triangle Clean</title>
<style>
  body {
    margin: 0;
    background: #0c0c0c;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  canvas {
    background: #0c0c0c;
  }
</style>
</head>
<body>
<canvas id="canvas" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

const center = { x: W/2, y: H/2 + 40 };
const outerRadius = 230;
const whiteOffset = 18;
const cornerGap = 14;

// valeurs 0 → 100
let values = [40, 60, 20];

// ===============================
// Utils
// ===============================

function lerp(a,b,t){ return a + (b-a)*t; }

function trianglePoints(radius) {
  const pts = [];
  for(let i=0;i<3;i++){
    const angle = -Math.PI/2 + i * (2*Math.PI/3);
    pts.push({
      x: center.x + Math.cos(angle) * radius,
      y: center.y + Math.sin(angle) * radius
    });
  }
  return pts;
}

function drawTriangle(points, stroke=false, fill=false) {
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  ctx.lineTo(points[1].x, points[1].y);
  ctx.lineTo(points[2].x, points[2].y);
  ctx.closePath();

  if(fill){
    ctx.fillStyle = "#f2f2f2";
    ctx.fill();
  }

  if(stroke){
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 3;
    ctx.stroke();
  }
}

function normalize(v){
  const l = Math.hypot(v.x, v.y);
  return { x: v.x/l, y: v.y/l };
}

// ===============================
// Draw
// ===============================

function draw(){

  ctx.clearRect(0,0,W,H);

  // triangle extérieur fixe
  const outer = trianglePoints(outerRadius);
  drawTriangle(outer, true, false);

  // triangle blanc interne (toujours aligné)
  const inner = trianglePoints(outerRadius - whiteOffset);
  drawTriangle(inner, false, true);

  // cercles
  for(let i=0;i<3;i++){

    const val = values[i] / 100;

    const vertex = inner[i];

    // direction vers centre
    const toCenter = normalize({
      x: center.x - vertex.x,
      y: center.y - vertex.y
    });

    // taille cercle
    const minR = 16;
    const maxR = 75;
    const radius = lerp(minR, maxR, val);

    // distance depuis sommet :
    // plus valeur haute → plus proche centre
    const minDist = radius + cornerGap;
    const maxDist = 120;

    const dist = lerp(maxDist, minDist, val);

    const cx = vertex.x + toCenter.x * dist;
    const cy = vertex.y + toCenter.y * dist;

    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI*2);
    ctx.fillStyle = "#111111";
    ctx.fill();
  }
}

draw();

// ===============================
// Demo animation
// ===============================

setInterval(()=>{
  values = values.map(v=>{
    v += (Math.random()*20 - 10);
    return Math.max(0, Math.min(100, v));
  });
  draw();
}, 1200);

</script>
</body>
</html>
