<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Thermal Triangle – Push Geometry</title>
<style>
body{
  margin:0;
  background:#0c0c0c;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
</style>
</head>
<body>
<canvas id="c" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

const center = { x: W/2, y: H/2 + 40 };
const outerRadius = 230;
const whiteOffset = 18;
const margin = 10;

let values = [30, 70, 40];
let target = [30, 70, 40];

function lerp(a,b,t){ return a+(b-a)*t; }

function normalize(v){
  const l=Math.hypot(v.x,v.y);
  return {x:v.x/l,y:v.y/l};
}

function trianglePoints(radius){
  const pts=[];
  for(let i=0;i<3;i++){
    const a=-Math.PI/2+i*(2*Math.PI/3);
    pts.push({
      x:center.x+Math.cos(a)*radius,
      y:center.y+Math.sin(a)*radius
    });
  }
  return pts;
}

function draw(){

  ctx.clearRect(0,0,W,H);

  // interpolation fluide
  for(let i=0;i<3;i++){
    values[i]+= (target[i]-values[i]) * 0.08;
  }

  const outer = trianglePoints(outerRadius);
  const inner = trianglePoints(outerRadius - whiteOffset);

  // triangle extérieur
  ctx.beginPath();
  ctx.moveTo(outer[0].x,outer[0].y);
  ctx.lineTo(outer[1].x,outer[1].y);
  ctx.lineTo(outer[2].x,outer[2].y);
  ctx.closePath();
  ctx.strokeStyle="#fff";
  ctx.lineWidth=3;
  ctx.stroke();

  const circles=[];
  const cornerRadii=[];

  for(let i=0;i<3;i++){

    const v = values[i]/100;

    // rayon évolue
    const minR=14;
    const maxR=70;
    const r=lerp(minR,maxR,v);

    const vertex=inner[i];
    const dir=normalize({
      x:center.x-vertex.x,
      y:center.y-vertex.y
    });

    // distance dépend du rayon (clé importante)
    const baseDist = 140;
    const dist = baseDist - r;

    const cx = vertex.x + dir.x*dist;
    const cy = vertex.y + dir.y*dist;

    circles.push({x:cx,y:cy,r:r});
    cornerRadii.push(r + margin);
  }

  // === Construction du triangle repoussé ===

  ctx.beginPath();

  for(let i=0;i<3;i++){

    const prev = circles[(i+2)%3];
    const curr = circles[i];
    const next = circles[(i+1)%3];

    const r = cornerRadii[i];

    const dir1 = normalize({x:prev.x-curr.x,y:prev.y-curr.y});
    const dir2 = normalize({x:next.x-curr.x,y:next.y-curr.y});

    const p1 = {
      x: curr.x + dir1.x * r,
      y: curr.y + dir1.y * r
    };

    const p2 = {
      x: curr.x + dir2.x * r,
      y: curr.y + dir2.y * r
    };

    if(i===0) ctx.moveTo(p1.x,p1.y);
    else ctx.lineTo(p1.x,p1.y);

    ctx.arc(curr.x,curr.y,r,
      Math.atan2(p1.y-curr.y,p1.x-curr.x),
      Math.atan2(p2.y-curr.y,p2.x-curr.x)
    );
  }

  ctx.closePath();
  ctx.fillStyle="#f2f2f2";
  ctx.fill();

  // cercles noirs
  circles.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.fillStyle="#111";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

draw();

setInterval(()=>{
  target = target.map(v=>{
    v+=Math.random()*40-20;
    return Math.max(0,Math.min(100,v));
  });
},2500);

</script>
</body>
</html>
