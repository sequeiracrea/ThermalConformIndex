<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
  margin:0;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
canvas{background:white;}
</style>
</head>
<body>

<canvas id="canvas" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// ------------------------------
// TRIANGLE EXTERIEUR FIXE
// ------------------------------
const outer = [
  {x:300, y:100},
  {x:520, y:500},
  {x:80,  y:500}
];

const constantGap = 25; // distance fixe cercle → triangle extérieur
const circleMin = 12;
const circleMax = 45;

let t = 0;

// ------------------------------
// OUTILS
// ------------------------------
function normalize(v){
  const len = Math.hypot(v.x, v.y);
  return {x:v.x/len, y:v.y/len};
}

function drawOuter(){
  ctx.beginPath();
  ctx.moveTo(outer[0].x, outer[0].y);
  ctx.lineTo(outer[1].x, outer[1].y);
  ctx.lineTo(outer[2].x, outer[2].y);
  ctx.closePath();
  ctx.lineWidth = 3;
  ctx.strokeStyle="#222";
  ctx.stroke();
}

// ------------------------------
// CALCUL CENTRE CERCLE
// toujours à distance constante du triangle fixe
// ------------------------------
function computeCircle(index, value){

  const prev = outer[(index+2)%3];
  const current = outer[index];
  const next = outer[(index+1)%3];

  const v1 = normalize({x:prev.x-current.x, y:prev.y-current.y});
  const v2 = normalize({x:next.x-current.x, y:next.y-current.y});

  const bisector = normalize({
    x:v1.x+v2.x,
    y:v1.y+v2.y
  });

  const radius = circleMin + value*(circleMax-circleMin);

  // centre placé vers l'intérieur
  const cx = current.x + bisector.x*(constantGap + radius);
  const cy = current.y + bisector.y*(constantGap + radius);

  return {cx, cy, radius};
}

// ------------------------------
// TRIANGLE INTERIEUR ARRONDI
// ------------------------------
function drawInnerRounded(circles){

  ctx.beginPath();

  for(let i=0;i<3;i++){

    const c = circles[i];
    const next = circles[(i+1)%3];

    if(i===0){
      ctx.moveTo(
        c.cx + (next.cx - c.cx),
        c.cy + (next.cy - c.cy)
      );
    }

    // ligne entre cercles
    ctx.lineTo(next.cx, next.cy);
  }

  ctx.closePath();
  ctx.fillStyle="#B7E4C7";
  ctx.fill();
}

// ------------------------------
// RENDER
// ------------------------------
function render(){

  ctx.clearRect(0,0,600,600);

  drawOuter();

  // simulation valeurs 0 → 1
  const v1 = (Math.sin(t)+1)/2;
  const v2 = (Math.sin(t+2)+1)/2;
  const v3 = (Math.sin(t+4)+1)/2;

  const circles = [
    computeCircle(0,v1),
    computeCircle(1,v2),
    computeCircle(2,v3)
  ];

  drawInnerRounded(circles);

  circles.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.cx, c.cy, c.radius, 0, Math.PI*2);
    ctx.fillStyle="#52B788";
    ctx.fill();
  });

  t+=0.02;
  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
