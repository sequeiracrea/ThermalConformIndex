<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triangle Comfort Visualization</title>
<style>
  body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f0f0f0;
  }
  canvas {
    background: #fff;
    border: 1px solid #ccc;
  }
</style>
</head>
<body>
<canvas id="triangleCanvas" width="500" height="500"></canvas>

<script>
const canvas = document.getElementById('triangleCanvas');
const ctx = canvas.getContext('2d');

// -------------------------
// Configuration triangle
// -------------------------
const exterior = [
  {x: 250, y: 50},
  {x: 450, y: 400},
  {x: 50,  y: 400}
];
const exteriorStroke = '#333';
const offset = 30; // espace constant entre triangle extérieur et intérieur

// Cercle aux angles
const circleMin = 12;
const circleMax = 40;
const circleColor = '#98D7A7';

// Variables confort (initiales à zéro)
let comfortTemp = 0;
let comfortHum  = 0;
let comfortPress= 0;

// -------------------------
// Calcul du triangle intérieur
// -------------------------
function computeInnerTriangle() {
  const center = {
    x: (exterior[0].x + exterior[1].x + exterior[2].x)/3,
    y: (exterior[0].y + exterior[1].y + exterior[2].y)/3
  };

  return exterior.map((p,i) => {
    let v;
    if(i===0) v = comfortTemp/100;
    else if(i===1) v = comfortHum/100;
    else v = comfortPress/100;

    return {
      x: center.x + (p.x - center.x)*(1 - offset/200*v),
      y: center.y + (p.y - center.y)*(1 - offset/200*v)
    };
  });
}

// -------------------------
// Dessiner un triangle
// -------------------------
function drawTriangle(points, fillColor=null, strokeColor='#000', lineWidth=2) {
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  ctx.lineTo(points[1].x, points[1].y);
  ctx.lineTo(points[2].x, points[2].y);
  ctx.closePath();
  if(fillColor){
    ctx.fillStyle = fillColor;
    ctx.fill();
  }
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = lineWidth;
  ctx.stroke();
}

// -------------------------
// Dessiner les cercles aux angles
// -------------------------
function drawCircles(points) {
  points.forEach((p,i)=>{
    let v;
    if(i===0) v = comfortTemp/100;
    else if(i===1) v = comfortHum/100;
    else v = comfortPress/100;

    const radius = circleMin + v*(circleMax-circleMin);

    // léger décalage vers l’intérieur pour simuler l’arrondi
    const dx = (points[(i+2)%3].x - points[i].x)*0.05;
    const dy = (points[(i+2)%3].y - points[i].y)*0.05;

    ctx.beginPath();
    ctx.arc(p.x+dx, p.y+dy, radius, 0, Math.PI*2);
    ctx.fillStyle = circleColor;
    ctx.fill();
  });
}

// -------------------------
// Rendu principal
// -------------------------
function render() {
  ctx.clearRect(0,0,canvas.width, canvas.height);

  // Triangle extérieur (contour)
  drawTriangle(exterior, null, exteriorStroke, 3);

  // Triangle intérieur (plein)
  const interior = computeInnerTriangle();
  drawTriangle(interior, '#c0f0d0', '#333', 2);

  // Cercles aux angles
  drawCircles(interior);
}

// -------------------------
// Récupération API
// -------------------------
async function fetchComfort() {
  try {
    const response = await fetch('https://ton-api/render-or-cloudflare/endpoint');
    const data = await response.json();

    // Calcul des valeurs confort (0-100)
    comfortTemp  = Math.max(0, 100 - Math.abs(data.measures.temp - 22) * 5);
    comfortHum   = Math.max(0, 100 - Math.abs(data.measures.rh - 50) * 1.5);
    comfortPress = Math.max(0, 100 - Math.abs(data.measures.pres - 1013) * 0.5);

  } catch (e) {
    console.error(e);
  }
}

// -------------------------
// Boucle continue
// -------------------------
async function updateLoop() {
  await fetchComfort();
  render();
  requestAnimationFrame(updateLoop);
}

// -------------------------
// Démarrage
// -------------------------
updateLoop();
</script>
</body>
</html>
