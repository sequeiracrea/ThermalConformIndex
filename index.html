<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TCI Thermal Triangle</title>
<style>
body{
  margin:0;
  background:#0c0c0c;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial, sans-serif;
}
</style>
</head>
<body>
<canvas id="c" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const API_BASE = "https://indoor-sim-server.onrender.com";

const W = canvas.width;
const H = canvas.height;

const center = { x: W/2, y: H/2 + 40 };
const outerRadius = 230;
const whiteOffset = 18;
const circleGap = 12;

let targetValues = [50,50,50];
let values = [50,50,50];

let apiStatus = "connecting";

// ======================
// UTILS
// ======================

function lerp(a,b,t){ return a+(b-a)*t; }

function normalizeVec(v){
  const l = Math.hypot(v.x,v.y);
  return { x:v.x/l, y:v.y/l };
}

function trianglePoints(radius){
  const pts=[];
  for(let i=0;i<3;i++){
    const a = -Math.PI/2 + i*(2*Math.PI/3);
    pts.push({
      x:center.x + Math.cos(a)*radius,
      y:center.y + Math.sin(a)*radius
    });
  }
  return pts;
}

function normalizeValue(value,min,max){
  const n = (value - min) / (max - min);
  return Math.max(0, Math.min(1, n)) * 100;
}

// ======================
// TRIANGLE ARRONDI EXACT
// ======================

function drawRoundedTriangle(points, radii, fill=true){

  ctx.beginPath();

  for(let i=0;i<3;i++){

    const prev = points[(i+2)%3];
    const curr = points[i];
    const next = points[(i+1)%3];

    const v1 = normalizeVec({x:prev.x-curr.x,y:prev.y-curr.y});
    const v2 = normalizeVec({x:next.x-curr.x,y:next.y-curr.y});

    const angle = Math.acos(v1.x*v2.x + v1.y*v2.y);

    const r = radii[i];
    const t = r / Math.tan(angle/2);

    const p1 = {
      x: curr.x + v1.x * t,
      y: curr.y + v1.y * t
    };

    const p2 = {
      x: curr.x + v2.x * t,
      y: curr.y + v2.y * t
    };

    if(i===0) ctx.moveTo(p1.x,p1.y);
    else ctx.lineTo(p1.x,p1.y);

    const bisector = normalizeVec({
      x: v1.x + v2.x,
      y: v1.y + v2.y
    });

    const centerArc = {
      x: curr.x + bisector.x * (r / Math.sin(angle/2)),
      y: curr.y + bisector.y * (r / Math.sin(angle/2))
    };

    const startAngle = Math.atan2(p1.y-centerArc.y,p1.x-centerArc.x);
    const endAngle   = Math.atan2(p2.y-centerArc.y,p2.x-centerArc.x);

    ctx.arc(centerArc.x, centerArc.y, r, startAngle, endAngle);
  }

  ctx.closePath();

  if(fill){
    ctx.fillStyle="#f2f2f2";
    ctx.fill();
  }
}

// ======================
// DRAW LOOP
// ======================

function draw(){

  ctx.clearRect(0,0,W,H);

  // interpolation fluide
  for(let i=0;i<3;i++){
    values[i] += (targetValues[i] - values[i]) * 0.08;
  }

  const outer = trianglePoints(outerRadius);
  const inner = trianglePoints(outerRadius - whiteOffset);

  // triangle extérieur
  ctx.beginPath();
  ctx.moveTo(outer[0].x,outer[0].y);
  ctx.lineTo(outer[1].x,outer[1].y);
  ctx.lineTo(outer[2].x,outer[2].y);
  ctx.closePath();
  ctx.strokeStyle="#ffffff";
  ctx.lineWidth=3;
  ctx.stroke();

  const radii=[];
  const circles=[];

  for(let i=0;i<3;i++){

    const val = values[i]/100;

    const minR=18;
    const maxR=75;
    const circleR=lerp(minR,maxR,val);

    radii.push(circleR + circleGap);

    const vertex = inner[i];
    const dir = normalizeVec({
      x:center.x-vertex.x,
      y:center.y-vertex.y
    });

    const minDist=circleR+circleGap;
    const maxDist=120;
    const dist=lerp(maxDist,minDist,val);

    const cx = vertex.x + dir.x*dist;
    const cy = vertex.y + dir.y*dist;

    circles.push({x:cx,y:cy,r:circleR});
  }

  // triangle blanc arrondi
  drawRoundedTriangle(inner,radii,true);

  // CLIP
  ctx.save();
  drawRoundedTriangle(inner,radii,false);
  ctx.clip();

  circles.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.fillStyle="#111";
    ctx.fill();
  });

  ctx.restore();

  drawStatus();

  requestAnimationFrame(draw);
}

function drawStatus(){
  ctx.fillStyle="#888";
  ctx.font="12px Arial";
  ctx.fillText("API: "+apiStatus,20,H-20);
}

// ======================
// API
// ======================

async function fetchData(){
  try{
    const res = await fetch(API_BASE + "/data");
    if(!res.ok) throw new Error();

    const data = await res.json();
    const m = data.measures;

    const tempNorm = normalizeValue(m.temp, 10, 35);
    const rhNorm   = normalizeValue(m.rh, 0, 100);
    const presNorm = normalizeValue(m.pres, 950, 1050);

    targetValues = [tempNorm, rhNorm, presNorm];

    apiStatus = "TCI live";

  }catch(e){
    apiStatus = "offline / waking";
  }
}

async function checkHealth(){
  try{
    const res = await fetch(API_BASE + "/health");
    if(res.ok) apiStatus="healthy";
  }catch(e){
    apiStatus="server sleep";
  }
}

// polling
setInterval(fetchData,5000);
setInterval(checkHealth,15000);

fetchData();
checkHealth();

draw();
</script>
</body>
</html>
