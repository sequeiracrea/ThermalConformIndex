<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
  margin:0;
  background:#0e0e0e;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
canvas{background:#0e0e0e;}
</style>
</head>
<body>

<canvas id="canvas" width="700" height="700"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const outer = [
  {x:350, y:120},
  {x:620, y:600},
  {x:80,  y:600}
];

const blackMin = 20;
const blackMax = 90;

const whiteGap = 12;

const minOffset = 25;  // proche du bord
const maxOffset = 120; // proche du centre

let t = 0;

// -----------------
function normalize(v){
  const l = Math.hypot(v.x,v.y);
  return {x:v.x/l, y:v.y/l};
}

// centre global
const center = {
  x:(outer[0].x+outer[1].x+outer[2].x)/3,
  y:(outer[0].y+outer[1].y+outer[2].y)/3
};

// -----------------
function computeInnerPoints(values){

  return outer.map((p,i)=>{

    const dir = normalize({
      x:center.x - p.x,
      y:center.y - p.y
    });

    const move = minOffset + values[i]*(maxOffset-minOffset);

    return {
      x: p.x + dir.x*move,
      y: p.y + dir.y*move
    };
  });
}

// -----------------
function drawOuter(){
  ctx.beginPath();
  ctx.moveTo(outer[0].x, outer[0].y);
  ctx.lineTo(outer[1].x, outer[1].y);
  ctx.lineTo(outer[2].x, outer[2].y);
  ctx.closePath();
  ctx.lineWidth = 3;
  ctx.strokeStyle = "white";
  ctx.stroke();
}

// -----------------
function drawRoundedTriangle(tri, radii){

  ctx.beginPath();

  for(let i=0;i<3;i++){

    const prev = tri[(i+2)%3];
    const cur = tri[i];
    const next = tri[(i+1)%3];

    const v1 = normalize({x:prev.x-cur.x, y:prev.y-cur.y});
    const v2 = normalize({x:next.x-cur.x, y:next.y-cur.y});

    const p1 = {
      x: cur.x + v1.x*radii[i],
      y: cur.y + v1.y*radii[i]
    };

    const p2 = {
      x: cur.x + v2.x*radii[i],
      y: cur.y + v2.y*radii[i]
    };

    if(i===0) ctx.moveTo(p1.x,p1.y);
    else ctx.lineTo(p1.x,p1.y);

    ctx.quadraticCurveTo(cur.x,cur.y,p2.x,p2.y);
  }

  ctx.closePath();
  ctx.fillStyle="#EDEDED";
  ctx.fill();
}

// -----------------
function render(){

  ctx.clearRect(0,0,700,700);

  drawOuter();

  const v1 = (Math.sin(t)+1)/2;
  const v2 = (Math.sin(t+2)+1)/2;
  const v3 = (Math.sin(t+4)+1)/2;

  const values = [v1,v2,v3];

  const innerPoints = computeInnerPoints(values);

  const blackRadii = values.map(v =>
    blackMin + v*(blackMax-blackMin)
  );

  const whiteRadii = blackRadii.map(r => r + whiteGap);

  drawRoundedTriangle(innerPoints, whiteRadii);

  innerPoints.forEach((p,i)=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,blackRadii[i],0,Math.PI*2);
    ctx.fillStyle="#111";
    ctx.fill();
  });

  t+=0.02;
  requestAnimationFrame(render);
}

render();
</script>

</body>
</html>
