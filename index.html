<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thermal Comfort Triangle</title>
<style>
  body {
    margin: 0;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  canvas {
    background: white;
  }
</style>
</head>
<body>

<canvas id="canvas" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// --------------------------------
// CONFIGURATION
// --------------------------------
const outerTriangle = [
  {x: 300, y: 80},   // Top (Temp)
  {x: 520, y: 500},  // Right (Hum)
  {x: 80,  y: 500}   // Left (Press)
];

const center = {
  x: (outerTriangle[0].x + outerTriangle[1].x + outerTriangle[2].x)/3,
  y: (outerTriangle[0].y + outerTriangle[1].y + outerTriangle[2].y)/3
};

const innerGap = 60;      // espace constant extérieur → intérieur
const circleGap = 18;     // espace constant sommet → cercle
const circleMin = 10;
const circleMax = 45;

let t = 0;

// --------------------------------
// UTILITAIRE NORMALISATION
// --------------------------------
function normalize(v){
  const len = Math.hypot(v.x, v.y);
  return {x: v.x/len, y: v.y/len};
}

// --------------------------------
// CALCUL TRIANGLE INTÉRIEUR
// --------------------------------
function computeInnerTriangle(values){
  return outerTriangle.map((p,i)=>{
    const dir = normalize({
      x: p.x - center.x,
      y: p.y - center.y
    });

    const scale = innerGap + values[i] * 0.8;

    return {
      x: p.x - dir.x * scale,
      y: p.y - dir.y * scale
    };
  });
}

// --------------------------------
// CALCUL POSITION CERCLE
// (bissectrice réelle de l’angle)
// --------------------------------
function computeCirclePosition(triangle, index, radius){
  const prev = triangle[(index + 2) % 3];
  const current = triangle[index];
  const next = triangle[(index + 1) % 3];

  const v1 = normalize({x: prev.x - current.x, y: prev.y - current.y});
  const v2 = normalize({x: next.x - current.x, y: next.y - current.y});

  const bisector = normalize({
    x: v1.x + v2.x,
    y: v1.y + v2.y
  });

  return {
    x: current.x + bisector.x * (radius + circleGap),
    y: current.y + bisector.y * (radius + circleGap)
  };
}

// --------------------------------
// DESSIN TRIANGLE
// --------------------------------
function drawTriangle(points, fill=null, stroke="#000", width=2){
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  ctx.lineTo(points[1].x, points[1].y);
  ctx.lineTo(points[2].x, points[2].y);
  ctx.closePath();

  if(fill){
    ctx.fillStyle = fill;
    ctx.fill();
  }

  ctx.lineWidth = width;
  ctx.strokeStyle = stroke;
  ctx.stroke();
}

// --------------------------------
// RENDER
// --------------------------------
function render(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Simulation valeurs 0 → 100
  const comfortTemp  = (Math.sin(t) + 1) * 50;
  const comfortHum   = (Math.sin(t + 2) + 1) * 50;
  const comfortPress = (Math.sin(t + 4) + 1) * 50;

  const values = [comfortTemp, comfortHum, comfortPress];

  // 1️⃣ Triangle extérieur
  drawTriangle(outerTriangle, null, "#222", 3);

  // 2️⃣ Triangle intérieur
  const innerTriangle = computeInnerTriangle(values);
  drawTriangle(innerTriangle, "#B7E4C7", "#222", 2);

  // 3️⃣ Cercles parfaitement alignés
  innerTriangle.forEach((point, i)=>{

    const radius = circleMin + (values[i]/100) * (circleMax - circleMin);

    const circlePos = computeCirclePosition(innerTriangle, i, radius);

    ctx.beginPath();
    ctx.arc(circlePos.x, circlePos.y, radius, 0, Math.PI*2);
    ctx.fillStyle = "#52B788";
    ctx.fill();
  });

  t += 0.02;
  requestAnimationFrame(render);
}

render();
</script>

</body>
</html>
