<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
  margin:0;
  background:#0e0e0e;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
canvas{background:#0e0e0e;}
</style>
</head>
<body>

<canvas id="canvas" width="700" height="700"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Triangle extérieur fixe
const outer = [
  {x:350, y:120},
  {x:620, y:600},
  {x:80,  y:600}
];

const offset = 70;        // distance constante entre triangles
const blackMin = 25;
const blackMax = 95;
const whiteGap = 14;

let t = 0;

// ---------------------
// Outils math
// ---------------------
function normalize(v){
  const l = Math.hypot(v.x,v.y);
  return {x:v.x/l, y:v.y/l};
}

function lineIntersection(p1,p2,p3,p4){
  const A1 = p2.y - p1.y;
  const B1 = p1.x - p2.x;
  const C1 = A1*p1.x + B1*p1.y;

  const A2 = p4.y - p3.y;
  const B2 = p3.x - p4.x;
  const C2 = A2*p3.x + B2*p3.y;

  const det = A1*B2 - A2*B1;
  return {
    x:(B2*C1 - B1*C2)/det,
    y:(A1*C2 - A2*C1)/det
  };
}

// ---------------------
// Offset géométrique parfait
// ---------------------
function offsetTriangle(tri, dist){

  const lines = [];

  for(let i=0;i<3;i++){
    const p1 = tri[i];
    const p2 = tri[(i+1)%3];

    const edge = normalize({
      x:p2.x-p1.x,
      y:p2.y-p1.y
    });

    const normal = {x:-edge.y, y:edge.x};

    lines.push([
      {x:p1.x + normal.x*dist, y:p1.y + normal.y*dist},
      {x:p2.x + normal.x*dist, y:p2.y + normal.y*dist}
    ]);
  }

  return [
    lineIntersection(lines[0][0],lines[0][1],lines[1][0],lines[1][1]),
    lineIntersection(lines[1][0],lines[1][1],lines[2][0],lines[2][1]),
    lineIntersection(lines[2][0],lines[2][1],lines[0][0],lines[0][1])
  ];
}

// ---------------------
// Dessin triangle extérieur
// ---------------------
function drawOuter(){
  ctx.beginPath();
  ctx.moveTo(outer[0].x, outer[0].y);
  ctx.lineTo(outer[1].x, outer[1].y);
  ctx.lineTo(outer[2].x, outer[2].y);
  ctx.closePath();
  ctx.lineWidth = 3;
  ctx.strokeStyle = "white";
  ctx.stroke();
}

// ---------------------
// Triangle intérieur arrondi
// ---------------------
function drawRoundedTriangle(tri, radii){

  ctx.beginPath();

  for(let i=0;i<3;i++){

    const prev = tri[(i+2)%3];
    const cur = tri[i];
    const next = tri[(i+1)%3];

    const v1 = normalize({x:prev.x-cur.x, y:prev.y-cur.y});
    const v2 = normalize({x:next.x-cur.x, y:next.y-cur.y});

    const p1 = {
      x: cur.x + v1.x*radii[i],
      y: cur.y + v1.y*radii[i]
    };

    const p2 = {
      x: cur.x + v2.x*radii[i],
      y: cur.y + v2.y*radii[i]
    };

    if(i===0) ctx.moveTo(p1.x,p1.y);
    else ctx.lineTo(p1.x,p1.y);

    ctx.quadraticCurveTo(cur.x,cur.y,p2.x,p2.y);
  }

  ctx.closePath();
  ctx.fillStyle="#EDEDED";
  ctx.fill();
}

// ---------------------
// Render
// ---------------------
function render(){

  ctx.clearRect(0,0,700,700);

  drawOuter();

  const v1 = (Math.sin(t)+1)/2;
  const v2 = (Math.sin(t+2)+1)/2;
  const v3 = (Math.sin(t+4)+1)/2;

  const values = [v1,v2,v3];

  const inner = offsetTriangle(outer, offset);

  const blackRadii = values.map(v =>
    blackMin + v*(blackMax-blackMin)
  );

  const whiteRadii = blackRadii.map(r => r + whiteGap);

  drawRoundedTriangle(inner, whiteRadii);

  // Cercles noirs parfaitement contenus
  inner.forEach((p,i)=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,blackRadii[i],0,Math.PI*2);
    ctx.fillStyle="#111";
    ctx.fill();
  });

  t+=0.02;
  requestAnimationFrame(render);
}

render();
</script>

</body>
</html>
