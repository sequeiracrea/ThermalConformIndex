<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
  margin:0;
  background:#0e0e0e;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
canvas{background:#0e0e0e;}
</style>
</head>
<body>

<canvas id="canvas" width="700" height="700"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// -------------------
// TRIANGLE EXTERIEUR
// -------------------
const outer = [
  {x:350, y:120},
  {x:620, y:600},
  {x:80,  y:600}
];

const gap = 30; // distance fixe cercle → contour
const circleMin = 20;
const circleMax = 90;

let t = 0;

// -------------------
function normalize(v){
  const l = Math.hypot(v.x,v.y);
  return {x:v.x/l, y:v.y/l};
}

// -------------------
// Calcul centre cercle
// -------------------
function computeCircle(index,value){

  const prev = outer[(index+2)%3];
  const cur = outer[index];
  const next = outer[(index+1)%3];

  const v1 = normalize({x:prev.x-cur.x, y:prev.y-cur.y});
  const v2 = normalize({x:next.x-cur.x, y:next.y-cur.y});

  const bis = normalize({x:v1.x+v2.x, y:v1.y+v2.y});

  const r = circleMin + value*(circleMax-circleMin);

  return {
    cx: cur.x + bis.x*(gap + r),
    cy: cur.y + bis.y*(gap + r),
    r
  };
}

// -------------------
// Dessin triangle extérieur
// -------------------
function drawOuter(){
  ctx.beginPath();
  ctx.moveTo(outer[0].x, outer[0].y);
  ctx.lineTo(outer[1].x, outer[1].y);
  ctx.lineTo(outer[2].x, outer[2].y);
  ctx.closePath();
  ctx.lineWidth = 3;
  ctx.strokeStyle = "white";
  ctx.stroke();
}

// -------------------
// Dessin forme intérieure
// -------------------
function drawInner(circles){

  ctx.beginPath();

  for(let i=0;i<3;i++){
    const c = circles[i];
    const next = circles[(i+1)%3];

    const angle = Math.atan2(next.cy-c.cy,next.cx-c.cx);

    const p1 = {
      x: c.cx + Math.cos(angle)*c.r,
      y: c.cy + Math.sin(angle)*c.r
    };

    const p2 = {
      x: next.cx - Math.cos(angle)*next.r,
      y: next.cy - Math.sin(angle)*next.r
    };

    if(i===0) ctx.moveTo(p1.x,p1.y);
    else ctx.lineTo(p1.x,p1.y);

    ctx.lineTo(p2.x,p2.y);
  }

  ctx.closePath();
  ctx.fillStyle="#EDEDED";
  ctx.fill();
}

// -------------------
// RENDER
// -------------------
function render(){

  ctx.clearRect(0,0,700,700);

  drawOuter();

  // simulation douce
  const v1 = (Math.sin(t)+1)/2;
  const v2 = (Math.sin(t+2)+1)/2;
  const v3 = (Math.sin(t+4)+1)/2;

  const circles = [
    computeCircle(0,v1),
    computeCircle(1,v2),
    computeCircle(2,v3)
  ];

  drawInner(circles);

  circles.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.cx,c.cy,c.r,0,Math.PI*2);
    ctx.fillStyle="#111";
    ctx.fill();
  });

  t+=0.02;
  requestAnimationFrame(render);
}

render();
</script>

</body>
</html>
